<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Quiz">
	<meta name="author" content="Nova Sonomura">
	<title>Quiz</title>
	<link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
	<h1>Quiz</h1>
	<form>
		<label for="q1">Red and blue make ____</label>
		<input id="q1" name="q1" type="text">
		<label for="q2">What is the best thing about food?</label>
		<textarea id="q2" name="q2"></textarea>
		<label for="q3">What is the best option?</label>
		<select id="q3" name="q3">
			<option value="" selected disabled>Choose One...</option>
			<option value="1">Option 1</option>
			<option value="2">Option 2</option>
			<option value="3">Option 3</option>
		</select>
		<label for="q4">Enter your favorite number:</label>
		<input id="q4" name="q4" type="number">
		<button type="submit">Submit</button>
	</form>
</body>
</html>
