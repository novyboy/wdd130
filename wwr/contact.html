<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Contact page for Canoe do it.">
	<meta name="author" content="Nova Sonomura">
	<title>Contact | Canoe Do It</title>
	<link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
	<header>
		<img src="images/logo.svg" alt="Canoe Do It Logo">
		<nav>
			<a href="index.html">Home</a>
			<a href="about.html">About Us</a>
			<a href="trips.html">Trips</a>
			<a href="contact.html">Contact Us</a>
		</nav>
	</header>
	<main>
		<section class="address">
			<h1>Canoe Do It</h1>
			<address>
				Old Puako Rd, Waimea, HI 96743, United States
				<a href="tel:+18083196155">+1 (808) 319-6155</a>
				<a href="mail:info@canoedoit.com">info@canoedoit.com</a>
			</address>
		</section>
		<section class="row">
			<iframe class="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3826782.342201363!2d-159.13205817563107!3d20.50244912067494!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7953873dc8ed598d%3A0xef827fd6b2d6adf9!2sHapuna%20Beach%20State%20Recreation%20Area!5e0!3m2!1sen!2sjp!4v1774926949732!5m2!1sen!2sjp" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
			<form class="form">
				<label for="q1">
					Name
					<input type="text" id="q1" name="q1" placeholder="Name">
				</label>
				<label for="q2">
					Email
					<input type="email" id="q2" name="q2" placeholder="Email">
				</label>
				<fieldset class="radio">
					<legend>Message Purpose</legend>
					<label for="q3a">
						<input type="radio" id="q3a" name="q3" value="a">
						General Inquiry
					</label>
						
					<label for="q3b">
						<input type="radio" id="q3b" name="q3" value="b">
						Reservation Question
					</label>
					<label for="q3c">
						<input type="radio" id="q3c" name="q3" value="c">
						Website Suggestion
					</label>
				</fieldset>
				<label for="q4">Message</label>
				<textarea id="q4" name="q4" placeholder="Type Here"></textarea>
				<label for="q5">
					<input type="checkbox" id="q5" name="q5">
					Please subscribe me to the monthly newsletter
				</label>
				<button type="submit">Get in Touch!</button>
			</form>
		</section>
		<section class="employees">
			<h2>
				We Are Here to Serve You
			</h2>
			<div>
				<figure>
					<img src="images/tanaka.jpg" alt="happy employee 1">
					<figcaption>Tanaka</figcaption>
				</figure>
				<figure>
					<img src="images/ishizaka.jpg" alt="happy employee 2">
					<figcaption>Ishizaka</figcaption>
				</figure>
				<figure>
					<img src="images/kyomen.jpg" alt="happy employee 3">
					<figcaption>Kyomen</figcaption>
				</figure>
			</div>
		</section>
	</main>
	<footer>
		<p>&copy;2026 🌺 Canoe Do It - Nova Sonomura 🌺 Honolulu, Hawaiʻi</p>
		<nav class="socialmedia">
			<a href="https://facebook.com">
				<img src="images/facebook.svg" alt="Facebook Icon">
			</a>
			<a href="https://linkedin.com">
				<img src="images/linkedin.svg" alt="Linkedin Icon">
			</a>
			<a href="https://instagram.com">
				<img src="images/instagram.svg" alt="Instagram Icon">
			</a>
		</nav>
	</footer>
</body>
</html>
